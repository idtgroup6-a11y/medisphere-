<!DOCTYPE html><html><head>
<meta charset="UTF-8"><title>Reset Password — MediSphere</title>
<script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="glass" style="max-width:420px;width:100%;padding:32px;">
    <h1 style="font-size:22px;font-weight:700;text-align:center;">Set New Password</h1>
    <form id="rp" style="display:flex;flex-direction:column;gap:12px;margin-top:18px;">
      <input id="new_password" type="password" class="input" placeholder="New Password" required>
      <input id="confirm_password" type="password" class="input" placeholder="Confirm Password" required>
      <button class="btn-primary" type="submit">Reset Password</button>
    </form>
  </div>
</div>
<script src="assets/js/app.js"></script>
<script>
rp.addEventListener('submit', async e => {
  e.preventDefault();
  const uid = sessionStorage.getItem('reset_uid');
  if (!uid) return toast('Session expired', 'error');
  try {
    await api('/auth/reset-password', { method:'POST', body: {
      user_id: uid, new_password: new_password.value, confirm_password: confirm_password.value
    }});
    toast('Password updated!', 'success');
    setTimeout(() => location.href = 'login.html', 700);
  } catch(err) { toast(err.message, 'error'); }
});
</script>
</body></html>
