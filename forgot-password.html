<!DOCTYPE html><html><head>
<meta charset="UTF-8"><title>Forgot Password — MediSphere</title>
<script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="glass" style="max-width:420px;width:100%;padding:32px;">
    <h1 style="font-size:22px;font-weight:700;text-align:center;">Forgot Password</h1>
    <p style="color:var(--muted);font-size:13px;text-align:center;margin-bottom:18px;">Enter your ID and phone to verify.</p>
    <form id="fp" style="display:flex;flex-direction:column;gap:12px;">
      <input id="user_code" class="input" placeholder="Patient/Doctor ID (e.g. PAT100001)" required>
      <input id="phone" class="input" placeholder="Phone Number" required>
      <button class="btn-primary" type="submit">Verify</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:13px;"><a href="login.html" style="color:var(--primary);">Back to Login</a></p>
  </div>
</div>
<script src="assets/js/app.js"></script>
<script>
fp.addEventListener('submit', async e => {
  e.preventDefault();
  try {
    const r = await api('/auth/forgot-password', { method:'POST', body: { user_code: user_code.value, phone: phone.value }});
    sessionStorage.setItem('reset_uid', r.user_id);
    toast('Verified! Set new password.', 'success');
    setTimeout(() => location.href = 'reset-password.html', 600);
  } catch(err) { toast(err.message, 'error'); }
});
</script>
</body></html>
