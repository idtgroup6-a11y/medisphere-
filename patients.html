<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patients — MediSphere</title>
<script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="header"></div>
<main style="max-width:900px;margin:0 auto;padding:18px;">
  <h2 style="font-weight:700;font-size:22px;margin-bottom:14px;">Patients</h2>
  <input id="search" class="input" placeholder="Search by name or ID…" style="margin-bottom:12px;">
  <div id="list"></div>
</main>
<div id="nav"></div>
<script src="assets/js/app.js"></script>
<script>
const u = Auth.require(['doctor','admin']); if (u) init();
let pts = [];
async function init() {
  document.getElementById('header').innerHTML = renderHeader('Patients');
  document.getElementById('nav').innerHTML = renderBottomNav('patients.html');
  pts = await api('/patients');
  render();
  search.addEventListener('input', render);
}
function render() {
  const q = (search.value||'').toLowerCase();
  const f = pts.filter(p => !q || p.full_name.toLowerCase().includes(q) || p.user_code.toLowerCase().includes(q));
  list.innerHTML = f.map(p => `
    <div class="card" style="padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:600;">${p.full_name}</div>
        <div style="font-size:12px;color:var(--muted);">${p.user_code} • ${p.profile?.blood_group||'—'} • ${p.gender||'—'}</div>
      </div>
      <a href="card.html?code=${p.user_code}" class="btn-ghost" style="padding:6px 12px;font-size:12px;">View</a>
    </div>`).join('') || '<div class="card" style="padding:40px;text-align:center;color:var(--muted);">No patients</div>';
}
</script>
</body></html>
