<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Card — MediSphere</title>
<script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="header"></div>
<main style="max-width:560px;margin:0 auto;padding:18px;">
  <div id="card"></div>
  <button id="dlBtn" class="btn-primary" style="width:100%;margin-top:14px;">Download PDF</button>
</main>
<div id="nav"></div>
<script src="assets/js/app.js"></script>
<script>
const u = Auth.require(); if (u) init();
const code = new URLSearchParams(location.search).get('code') || u.user_code;

async function init() {
  document.getElementById('header').innerHTML = renderHeader('Digital Card');
  document.getElementById('nav').innerHTML = renderBottomNav('profile.html');
  const data = await api('/card/' + code);
  const x = data.user, d = data.details || {};
  document.getElementById('card').innerHTML = `
    <div style="background:linear-gradient(135deg,#2563EB,#1D4ED8);color:white;border-radius:24px;padding:26px;box-shadow:0 12px 32px rgba(37,99,235,0.3);">
      <div style="font-size:13px;opacity:0.9;">MediSphere Digital Card</div>
      <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;">${x.role}</div>
      <div style="display:flex;justify-content:space-between;align-items:end;margin-top:30px;">
        <div>
          <div style="font-size:22px;font-weight:700;">${x.full_name}</div>
          <div style="font-size:13px;opacity:0.9;">${x.user_code}</div>
          <div style="font-size:12px;opacity:0.85;margin-top:8px;">📞 ${x.phone}</div>
          ${x.role==='patient' ? `
            <div style="font-size:12px;opacity:0.85;">🩸 ${d.blood_group||'—'}</div>
            <div style="font-size:12px;opacity:0.85;">🎂 ${x.dob||'—'}</div>
            <div style="font-size:12px;opacity:0.85;">🚨 ${d.emergency_contact||'—'}</div>
          ` : `
            <div style="font-size:12px;opacity:0.85;">${d.specialization||'—'}</div>
            <div style="font-size:12px;opacity:0.85;">${d.hospital_name||''}</div>
            <div style="font-size:12px;opacity:0.85;">License: ${d.license_number||'—'}</div>
          `}
        </div>
        <img src="/api/qr/${x.user_code}" style="width:90px;height:90px;background:white;border-radius:10px;padding:6px;">
      </div>
    </div>`;
}

dlBtn.onclick = async () => {
  const res = await fetch(`/api/card/${code}/pdf`, { headers:{ Authorization:'Bearer '+Auth.token() }});
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `card-${code}.pdf`; a.click();
};
</script>
</body></html>
